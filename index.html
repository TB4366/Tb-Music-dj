<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>DJ Set met 2 YouTube Decks</title>
<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

.deck{
    display:inline-block;
    width:45%;
    margin:20px;
}

input{
    width:80%;
    padding:10px;
    margin:10px;
}

button{
    padding:10px 20px;
    margin:5px;
}

iframe{
    width:100%;
    height:300px;
}

#crossfader{
    width:80%;
}
</style>
</head>
<body>

<h1>🎧 DJ Set - 2 Decks</h1>

<div class="deck">
    <h2>Deck A</h2>

    <input id="linkA"
    placeholder="YouTube link">

    <button onclick="loadVideo('A')">
        Laden
    </button>

    <iframe id="playerA"></iframe>
</div>

<div class="deck">
    <h2>Deck B</h2>

    <input id="linkB"
    placeholder="YouTube link">

    <button onclick="loadVideo('B')">
        Laden
    </button>

    <iframe id="playerB"></iframe>
</div>

<h2>🎚️ Crossfader</h2>

<input
type="range"
min="0"
max="100"
value="50"
id="crossfader">

<p>
Links = Deck A |
Rechts = Deck B
</p>

<script>
function getId(url){

    if(url.includes("watch?v=")){
        return url.split("watch?v=")[1]
                  .split("&")[0];
    }

    if(url.includes("youtu.be/")){
        return url.split("youtu.be/")[1];
    }

    return "";
}

function loadVideo(deck){

    let input =
    document.getElementById(
        "link"+deck
    ).value;

    let id = getId(input);

    if(id===""){
        alert("Geen geldige link");
        return;
    }

    document.getElementById(
        "player"+deck
    ).src =
    "https://www.youtube.com/embed/"
    + id +
    "?enablejsapi=1";
}
</script>

</body>
</html>
