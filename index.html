<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>DJ Mixer</title>
<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

.deck{
    display:inline-block;
    width:40%;
    padding:20px;
}

input[type=file]{
    margin:15px;
}

input[type=range]{
    width:250px;
}
</style>
</head>
<body>

<h1>🎧 DJ Mixer</h1>

<div class="deck">
    <h2>Deck A</h2>

    <audio id="audioA" controls></audio>
    <br><br>

    <input type="file"
           accept="audio/*"
           onchange="loadFile(event,'A')">

    <br><br>

    Volume:
    <input id="volA"
           type="range"
           min="0"
           max="1"
           step="0.01"
           value="1">
</div>

<div class="deck">
    <h2>Deck B</h2>

    <audio id="audioB" controls></audio>
    <br><br>

    <input type="file"
           accept="audio/*"
           onchange="loadFile(event,'B')">

    <br><br>

    Volume:
    <input id="volB"
           type="range"
           min="0"
           max="1"
           step="0.01"
           value="1">
</div>

<h2>🎚️ Crossfader</h2>

<input
id="cross"
type="range"
min="0"
max="100"
value="50">

<script>
const audioA = document.getElementById("audioA");
const audioB = document.getElementById("audioB");

function loadFile(e, deck){
    const file = e.target.files[0];
    if(!file) return;

    const url = URL.createObjectURL(file);

    document.getElementById(
        "audio"+deck
    ).src = url;
}

document.getElementById("cross")
.addEventListener("input", function(){

    const v = this.value / 100;

    audioA.volume = 1 - v;
    audioB.volume = v;
});

document.getElementById("volA")
.addEventListener("input", function(){
    audioA.volume = this.value;
});

document.getElementById("volB")
.addEventListener("input", function(){
    audioB.volume = this.value;
});
</script>

</body>
</html>
