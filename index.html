<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>DJ Set</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.dj{
    display:flex;
    gap:20px;
}

.deck,.mixer{
    background:#222;
    border-radius:15px;
    padding:20px;
    box-shadow:0 0 20px #000;
}

.deck{
    width:350px;
}

.mixer{
    width:250px;
}

.jog{
    width:220px;
    height:220px;
    border-radius:50%;
    background:
    radial-gradient(circle,#555,#111);
    margin:auto;
    animation:spin 6s linear infinite;
    animation-play-state:paused;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

button{
    padding:10px;
    margin:5px;
}

input[type=range]{
    width:100%;
}
</style>
</head>

<body>

<div class="dj">

<div class="deck">

<h2>Deck A</h2>

<div class="jog" id="jogA"></div>

<audio id="audioA"></audio>

<input
type="file"
accept="audio/*"
onchange="loadFile(event,'A')">

<br>

<button onclick="playDeck('A')">
Play
</button>

<button onclick="pauseDeck('A')">
Pause
</button>

</div>

<div class="mixer">

<h2>Mixer</h2>

Crossfader

<input
id="cross"
type="range"
min="0"
max="100"
value="50">

<br><br>

Volume A

<input
id="volA"
type="range"
min="0"
max="1"
step="0.01"
value="1">

<br><br>

Volume B

<input
id="volB"
type="range"
min="0"
max="1"
step="0.01"
value="1">

</div>

<div class="deck">

<h2>Deck B</h2>

<div class="jog" id="jogB"></div>

<audio id="audioB"></audio>

<input
type="file"
accept="audio/*"
onchange="loadFile(event,'B')">

<br>

<button onclick="playDeck('B')">
Play
</button>

<button onclick="pauseDeck('B')">
Pause
</button>

</div>

</div>

<script>
const audioA =
document.getElementById("audioA");

const audioB =
document.getElementById("audioB");

function loadFile(e,deck){

const file =
e.target.files[0];

if(!file) return;

const url =
URL.createObjectURL(file);

document.getElementById(
"audio"+deck
).src = url;
}

function playDeck(deck){

const audio =
document.getElementById(
"audio"+deck
);

audio.play();

document.getElementById(
"jog"+deck
).style.animationPlayState =
"running";
}

function pauseDeck(deck){

const audio =
document.getElementById(
"audio"+deck
);

audio.pause();

document.getElementById(
"jog"+deck
).style.animationPlayState =
"paused";
}

document
.getElementById("cross")
.oninput = function(){

let v =
this.value/100;

audioA.volume = 1-v;
audioB.volume = v;
};

document
.getElementById("volA")
.oninput = function(){
audioA.volume = this.value;
};

document
.getElementById("volB")
.oninput = function(){
audioB.volume = this.value;
};
</script>

</body>
</html>
