<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DJ Mixer Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dj">

<div class="deck">
<h2>DECK A</h2>

<div class="wave" id="waveA"></div>

<div class="jog" id="jogA"></div>

<audio id="audioA"></audio>

<input type="file" id="fileA" accept="audio/*">

<div class="controls">
<button id="playA">▶</button>
<button id="pauseA">⏸</button>
<button id="cueA">CUE</button>
<button id="loopA">LOOP</button>
</div>

Pitch
<input type="range" id="pitchA"
min="0.5" max="2" step="0.01" value="1">

Volume
<input type="range" id="volA"
min="0" max="1" step="0.01" value="1">
</div>

<div class="mixer">

<h2>MIXER</h2>

Crossfader
<input type="range"
id="cross"
min="0"
max="100"
value="50">

Bass
<input type="range"
id="bass"
min="-30"
max="30"
value="0">

Mid
<input type="range"
id="mid"
min="-30"
max="30"
value="0">

Treble
<input type="range"
id="treble"
min="-30"
max="30"
value="0">

Echo
<input type="range"
id="echo"
min="0"
max="1"
step="0.1"
value="0">

</div>

<div class="deck">
<h2>DECK B</h2>

<div class="wave" id="waveB"></div>

<div class="jog" id="jogB"></div>

<audio id="audioB"></audio>

<input type="file" id="fileB" accept="audio/*">

<div class="controls">
<button id="playB">▶</button>
<button id="pauseB">⏸</button>
<button id="cueB">CUE</button>
<button id="loopB">LOOP</button>
</div>

Pitch
<input type="range"
id="pitchB"
min="0.5"
max="2"
step="0.01"
value="1">

Volume
<input type="range"
id="volB"
min="0"
max="1"
step="0.01"
value="1">

</div>

</div>

<script src="app.js"></script>
</body>
</html>
