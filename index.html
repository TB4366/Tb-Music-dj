<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Set met YouTube</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
    margin: 0;
}

header {
    background: #000;
    padding: 20px;
    font-size: 28px;
    color: #00ffcc;
}

.container {
    padding: 20px;
}

input, button {
    padding: 12px;
    margin: 10px;
    border: none;
    border-radius: 8px;
}

input {
    width: 300px;
}

button {
    background: #00ffcc;
    cursor: pointer;
    font-weight: bold;
}

iframe {
    margin-top: 20px;
    width: 80%;
    max-width: 800px;
    height: 450px;
    border: none;
    border-radius: 15px;
}
</style>
</head>
<body>

<header>🎧 DJ SET - YouTube Player</header>

<div class="container">

    <h2>Zoek een nummer op YouTube</h2>

    <input type="text" id="zoek" placeholder="Bijv. Tiësto Adagio For Strings">
    <button onclick="zoekYouTube()">Zoeken</button>

    <br><br>

    <h2>Plak een YouTube-link</h2>

    <input type="text" id="youtubeLink"
           placeholder="https://www.youtube.com/watch?v=...">
    <button onclick="laadVideo()">Laden</button>

    <br>

    <iframe id="player"
        src=""
        allow="autoplay; encrypted-media"
        allowfullscreen>
    </iframe>

</div>

<script>
function zoekYouTube() {
    let zoekterm = document.getElementById("zoek").value;

    if (zoekterm !== "") {
        let url =
            "https://www.youtube.com/results?search_query=" +
            encodeURIComponent(zoekterm);

        window.open(url, "_blank");
    }
}

function laadVideo() {
    let link = document.getElementById("youtubeLink").value;

    let videoId = "";

    if (link.includes("watch?v=")) {
        videoId = link.split("watch?v=")[1].split("&")[0];
    } else if (link.includes("youtu.be/")) {
        videoId = link.split("youtu.be/")[1];
    }

    if (videoId !== "") {
        document.getElementById("player").src =
            "https://www.youtube.com/embed/" +
            videoId +
            "?autoplay=1";
    } else {
        alert("Geen geldige YouTube-link.");
    }
}
</script>

</body>
</html>
